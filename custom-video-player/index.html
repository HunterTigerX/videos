<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Video Player</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="./favicon.ico">
</head>

<body>
  <div class="body_wrapper">
    <div class="video_list">
      <div class="video_1"></div>
      <div class="video_2"></div>
      <div class="video_3"></div>
    </div>
    <div class="player_wrapper">
      <video class="video_player" src="./video/no_citizen.mp4">
      <!-- <video class="video_player" src="https://drive.usercontent.google.com/download?id=1Sskc4ztke9ysFbQ6QuJChom26SOjYxJl&export=download&confirm=t&uuid=8d7c7990-8c3e-41e8-9ca5-b878cb784292"> -->
      </video>
      <div class="video_controls">
        <div class="timeline_control_wrapper">
          <div class="timeline_control_line"></div>
        </div>
        <div class="hidden_control_settings">
          <button class="player_control play">►</button>
          <input type="range" class="range range_1" min="0" max="1" step="0.05" value="1"></input>
          <input type="range" class="range range_2" min="0.5" max="2" step="0.1" value="1"></input>
          <button class="backward">« 10s</button>
          <button class="forward">25s »</button>
        </div>
      </div>
    </div>
  </div>

</body>

<script src="./script.js"></script>

</html>
