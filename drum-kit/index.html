<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico">
</head>

<body>
    <main class="main main_dark">
        <div class="additional_functionality additional_functionality_dark">
            <button class="button_funct button_dark change_layout">Switch Sounds</button>
            <div class="recorded_music_wrapper">
                <button class="button_funct button_dark presets preset_1">Play Preset 1</button>
                <button class="button_funct button_dark presets preset_2">Play Preset 2</button>
                <button class="button_funct button_dark presets preset_3">Play Preset 3</button>
            </div>
            <button class="button_funct button_dark change_mode dark">Swith to Dark Mode</button>
        </div>
        <div class="keys_wrapper original">
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_A">
                <div class="drum_key_letter drum_key_letter_dark">
                    A
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Clap
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_S">
                <div class="drum_key_letter drum_key_letter_dark">
                    S
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Hihat
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_D">
                <div class="drum_key_letter drum_key_letter_dark">
                    D
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Kick
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_F">
                <div class="drum_key_letter drum_key_letter_dark">
                    F
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Openhat
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_G">
                <div class="drum_key_letter drum_key_letter_dark">
                    G
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Boom
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_H">
                <div class="drum_key_letter drum_key_letter_dark">
                    H
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Ride
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_J">
                <div class="drum_key_letter drum_key_letter_dark">
                    J
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Snare
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_K">
                <div class="drum_key_letter drum_key_letter_dark">
                    K
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Tom
                </span>
            </div>
            <div class="drum_key_wrapper drum_key_wrapper_dark" id="key_L">
                <div class="drum_key_letter drum_key_letter_dark">
                    L
                </div>
                <span class="drum_key_text drum_key_text_dark">
                    Tink
                </span>
            </div>
        </div>
    </main>
</body>

<script src="./script.js"></script>
</html>
